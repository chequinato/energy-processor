version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./energy.db:/app/energy.db
      - ./data:/app/data
    depends_on:
      - redis

  frontend:
    build: ./frontend/dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend

  redis:
    image: redis:7
    ports:
      - "6379:6379"
  